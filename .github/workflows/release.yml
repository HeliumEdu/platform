name: "Release"

run-name: "Release `${{ inputs.bump_type }}`"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      run_integration_tests:
        description: 'Run integration tests'
        required: true
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: 'Trigger deploy after release'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: prod
        options:
          - dev
          - prod
      run_legacy_cluster_tests:
        description: 'Run cluster tests for frontend-legacy before deploying'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      bump_type:
        description: "Version bump type"
        required: false
        type: string
        default: patch
      run_integration_tests:
        description: "Run integration tests"
        required: false
        type: boolean
        default: true
      trigger_deploy_after_release:
        description: "Trigger deploy after release"
        required: false
        type: boolean
        default: true
      environment:
        description: "Environment to deploy to"
        required: false
        type: string
        default: prod
      run_legacy_cluster_tests:
        description: "Run cluster tests for frontend-legacy before deploying"
        required: false
        type: boolean
        default: true
    outputs:
      version:
        description: "Released version"
        value: ${{ jobs.bump-version.outputs.version }}

permissions:
  contents: write

jobs:
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create_branch.outputs.branch_name }}
      base_sha: ${{ steps.create_branch.outputs.base_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ github.sha }}

      - name: Create and push release branch
        id: create_branch
        run: |
          BRANCH_NAME="release/${{ github.run_id }}-${{ github.run_attempt }}"
          BASE_SHA="$(git rev-parse HEAD)"

          git push origin "HEAD:refs/heads/${BRANCH_NAME}"

          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    needs: [create-release-branch]
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['create-release-branch'].outputs.base_sha }}

      - name: Set up Python "3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test
        run: make test

  integration-test:
    name: Integration Test
    needs: [create-release-branch]
    if: ${{ inputs.run_integration_tests == true || inputs.run_integration_tests == 'true' }}
    uses: ./.github/workflows/integration.yml
    with:
      suite: full
      caller: release
    secrets: inherit

  bump-version:
    name: Bump Version
    needs: [create-release-branch, test, integration-test]
    if: always() && needs.test.result == 'success' && (needs['integration-test'].result == 'success' || needs['integration-test'].result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      commit_sha: ${{ steps.get_commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ needs['create-release-branch'].outputs.branch_name }}

      - name: Set up Python "3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version
        run: |
          CURRENT_VERSION=$(grep "^__version__ = " conf/configs/common.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          case "${{ inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          sed -i "s/__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" conf/configs/common.py

      - name: Commit version bump
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "support@heliumedu.com"

          git add conf/configs/common.py

          NEW_VERSION=$(grep "^__version__ = " conf/configs/common.py | sed 's/__version__ = "\(.*\)"/\1/')
          git commit -m "Bump version to ${NEW_VERSION}"

          git push origin "HEAD:refs/heads/${{ needs['create-release-branch'].outputs.branch_name }}"

      - name: Get version and commit SHA
        id: get_version
        run: |
          VERSION=$(grep "^__version__ = " conf/configs/common.py | sed 's/__version__ = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get commit SHA
        id: get_commit
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "Commit SHA: $COMMIT_SHA"

  merge-release-branch:
    name: Merge Release Branch to Main
    needs: [create-release-branch, bump-version]
    if: always() && needs['create-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest
    outputs:
      merged_commit_sha: ${{ steps.merge.outputs.merged_commit_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Merge release branch
        id: merge
        env:
          RELEASE_BRANCH: ${{ needs['create-release-branch'].outputs.branch_name }}
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "support@heliumedu.com"

          git fetch origin "$RELEASE_BRANCH" main
          git checkout -B main origin/main
          git merge --no-ff --no-edit "origin/$RELEASE_BRANCH"
          git push origin main

          echo "merged_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cleanup release branch
        if: always()
        env:
          RELEASE_BRANCH: ${{ needs['create-release-branch'].outputs.branch_name }}
        run: |
          git push origin --delete "$RELEASE_BRANCH" || true

      - name: Merge main to develop
        if: success()
        run: |
          git fetch origin develop
          git checkout -B develop origin/develop
          if git merge --no-ff --no-edit origin/main; then
            git push origin develop
            echo "Successfully merged main to develop"
          else
            echo "::warning::Merge conflict detected when merging main to develop. Manual merge required."
            git merge --abort
          fi

  build-and-publish:
    name: Build and Publish Containers
    needs: [merge-release-branch, bump-version]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 1
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PLATFORM: amd64
      TAG_VERSION: ${{ needs['bump-version'].outputs.version }}
      ENVIRONMENT: prod

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}

      - name: Set up Python "3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to AWS ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/heliumedu

      - name: Build and publish containers
        run: make publish

      - name: Dump Docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2

  create-release-tag:
    name: Create Release Tag
    needs: [merge-release-branch, bump-version, build-and-publish]
    if: always() && needs['merge-release-branch'].result == 'success' && needs['bump-version'].result == 'success' && (needs['build-and-publish'].result == 'success' || needs['build-and-publish'].result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Display release info
        run: |
          echo "### Release ${{ needs['bump-version'].outputs.version }}" >> $GITHUB_STEP_SUMMARY

      - name: Create and push tag
        env:
          VERSION: ${{ needs['bump-version'].outputs.version }}
          COMMIT_SHA: ${{ needs['merge-release-branch'].outputs.merged_commit_sha }}
        run: |
          git config --global user.name "GitHub Release Bot"
          git config --global user.email "support@heliumedu.com"

          # Fetch latest changes to ensure we have the version bump commit
          git fetch origin main

          # Create version tag on the specific commit
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
          else
            echo "Creating tag $VERSION on commit $COMMIT_SHA"
            git tag -a "$VERSION" -m "Release $VERSION" "$COMMIT_SHA"
            git push origin "$VERSION"
          fi

      - name: Create Sentry release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VERSION: ${{ needs['bump-version'].outputs.version }}
        run: |
          pip install sentry-cli
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases new "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases set-commits --auto "$VERSION"
          SENTRY_PROPERTIES=sentry.properties sentry-cli releases finalize "$VERSION"

  deploy:
    name: Trigger Deploy Workflow
    needs: [create-release-tag, bump-version]
    if: always() && (inputs.trigger_deploy_after_release == true || inputs.trigger_deploy_after_release == 'true') && needs['create-release-tag'].result == 'success' && needs['bump-version'].result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          VERSION: ${{ needs['bump-version'].outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_LEGACY_CLUSTER_TESTS: ${{ inputs.run_legacy_cluster_tests }}
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            -f version_type=specific \
            -f specific_version="$VERSION" \
            -f environment="$ENVIRONMENT" \
            -f run_legacy_cluster_tests="$RUN_LEGACY_CLUSTER_TESTS"

      - name: Deployment trigger summary
        env:
          VERSION: ${{ needs['bump-version'].outputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_LEGACY_CLUSTER_TESTS: ${{ inputs.run_legacy_cluster_tests }}
        run: |
          echo "### Deploy Workflow Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Legacy Cluster Tests**: $RUN_LEGACY_CLUSTER_TESTS" >> $GITHUB_STEP_SUMMARY
